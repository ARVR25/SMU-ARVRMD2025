<!doctype html><html><head><meta charset="utf-8"/><title>SMU-ARVRMD2025/방명록</title><meta name="viewport" content="width=device-width,initial-scale=1"/><link rel="stylesheet" href="../styles/style.css"/><script defer="defer" src="../bundle.js"></script><link href="../styles/style.css" rel="stylesheet"></head><body><nav class="top-nav"><a class="title" href="../index.html">MOMENTUM</a><div id="nav-link"><div class="dropdown"><a class="nav-link2">ABOUT</a><div class="dropdown-content"><a href="./about.html">전시 개요</a> <a href="./about_poster.html">전시 비주얼</a></div></div><a href="./project.html" class="nav-link">PROJECT</a> <a href="./designers.html" class="nav-link">DESIGNERS</a> <a href="./invite.html" class="nav-link">방명록</a></div></nav><div class="main-content"><div class="input-form-container"><button type="button" id="guest-submit">작성</button><div class="input-group"><input id="guest-name"/></div><div class="input-group"><input id="guest-content"/></div><br></div></div><div id="guestbook-container"></div><script type="module">import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
            import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-analytics.js";
            import {
                getFirestore,
                collection,
                getDocs,
                addDoc,
            } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

            const firebaseConfig = {
                apiKey: "AIzaSyAQXfk5GDFCa0PdarLHDYll0rrEB5f1ZF8",
                authDomain: "smu-arvrmd2025.firebaseapp.com",
                projectId: "smu-arvrmd2025",
                storageBucket: "smu-arvrmd2025.firebasestorage.app",
                messagingSenderId: "591519928169",
                appId: "1:591519928169:web:5df88ed958531098b9b7f8",
                measurementId: "G-E83GY0L0WQ"
            };

            const app = initializeApp(firebaseConfig);
            const analytics = getAnalytics(app);
            const db = getFirestore(app);
            const guestRef = collection(db, "guests");

            async function sendGuest() {
                const name = document.querySelector("#guest-name").value;
                const content = document.querySelector("#guest-content").value;

                if (!name || !content) {
                    alert("이름과 내용을 모두 입력해주세요.");
                    return;
                }

                await addDoc(guestRef, {
                    name: name,
                    content: content,
                    created_at: new Date(),
                });
                
                document.querySelector("#guest-name").value = "";
                document.querySelector("#guest-content").value = "";
            }

            document.querySelector("#guest-submit").addEventListener("click", async () => {
                await sendGuest();
                showRandomGuests();
            });
            
            document.addEventListener("DOMContentLoaded", () => {
                showRandomGuests();
            });

            async function showRandomGuests() {
                const container = document.querySelector("#guestbook-container");
                container.innerHTML = '';

                const allGuests = await getDocs(guestRef);
                const guestList = allGuests.docs;
                
                if (guestList.length === 0) {
                    console.log("No guests found. Retrying in 10 seconds.");
                    setTimeout(showRandomGuests, 10000);
                    return;
                }

                const shuffledGuests = guestList.sort(() => 0.5 - Math.random());
                const limitedGuests = shuffledGuests.slice(0, 4);
                
                let time = 0;
                
                limitedGuests.forEach((data) => {
                    const date = new Date(data.data().created_at.toDate());
                    const myDate = `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일 ${date.getHours()}:${date.getMinutes()}`;

                    const guestItem = document.createElement("div");
                    guestItem.classList.add("guestbook-item");
                    
                    guestItem.innerHTML = `
                        <h3 class="guest-list-name">${data.data().name}</h3>
                        <p class="guest-list-content">${data.data().content}</p>
                        <h5 class="guest-list-created-at">작성일: ${myDate}</h5>
                    `;

                    guestItem.style.animationDelay = `${time}s`;
                    time += 0.2;
                    
                    container.appendChild(guestItem);
                });

                // 5초마다 갱신되도록 타이머 설정
                setTimeout(() => {
                    showRandomGuests();
                }, 10000);
            }</script></body></html>
